<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <defs>
    <!-- Purple gradient for text -->
    <linearGradient id="lg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDD"/>
      <stop offset="50%" stop-color="#C77DFF"/>
      <stop offset="100%" stop-color="#E0AAFF"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="lg-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glass highlight -->
    <linearGradient id="lg-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Star gradient -->
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C77DFF"/>
      <stop offset="100%" stop-color="#9D4EDD"/>
    </linearGradient>
  </defs>
  <!-- 4-point star / diamond sparkle -->
  <g transform="translate(14, 20)" filter="url(#lg-glow)">
    <path d="M0,-10 Q2,-2 10,0 Q2,2 0,10 Q-2,2 -10,0 Q-2,-2 0,-10Z" 
          fill="url(#star-grad)" opacity="0.95"/>
    <!-- Glass highlight on star -->
    <path d="M0,-10 Q2,-2 10,0 Q2,2 0,10 Q-2,2 -10,0 Q-2,-2 0,-10Z" 
          fill="url(#lg-highlight)" opacity="0.5"/>
  </g>
  <!-- Synapse wordmark -->
  <text x="30" y="25" 
        font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif" 
        font-size="18" font-weight="300" letter-spacing="3" 
        fill="url(#lg-glow)" filter="url(#lg-glow)">SYNAPSE</text>
  <!-- Glass highlight overlay on text -->
  <text x="30" y="25" 
        font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif" 
        font-size="18" font-weight="300" letter-spacing="3" 
        fill="url(#lg-highlight)" opacity="0.3">SYNAPSE</text>
</svg>