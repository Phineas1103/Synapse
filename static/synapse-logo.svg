<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 30" width="160" height="30">
  <defs>
    <linearGradient id="tg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDD"/>
      <stop offset="50%" stop-color="#C77DFF"/>
      <stop offset="100%" stop-color="#E0AAFF"/>
    </linearGradient>
    <filter id="tg-glow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="tg-hl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tstar-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C77DFF"/>
      <stop offset="100%" stop-color="#9D4EDD"/>
    </linearGradient>
  </defs>
  <g transform="translate(10, 15)" filter="url(#tg-glow)">
    <path d="M0,-8 Q1.5,-1.5 8,0 Q1.5,1.5 0,8 Q-1.5,1.5 -8,0 Q-1.5,-1.5 0,-8Z" 
          fill="url(#tstar-g)" opacity="0.95"/>
    <path d="M0,-8 Q1.5,-1.5 8,0 Q1.5,1.5 0,8 Q-1.5,1.5 -8,0 Q-1.5,-1.5 0,-8Z" 
          fill="url(#tg-hl)" opacity="0.5"/>
  </g>
  <text x="22" y="20" 
        font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif" 
        font-size="15" font-weight="300" letter-spacing="2.5" 
        fill="url(#tg-grad)" filter="url(#tg-glow)">SYNAPSE</text>
  <text x="22" y="20" 
        font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif" 
        font-size="15" font-weight="300" letter-spacing="2.5" 
        fill="url(#tg-hl)" opacity="0.3">SYNAPSE</text>
</svg>